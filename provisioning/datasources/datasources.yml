apiVersion: 1

datasources:
  - name: 'garminconnect'
    type: 'barnescdev-garminconnect-datasource'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    jsonData:
      email: '${GARMIN_EMAIL}'
    secureJsonData:
      password: '${GARMIN_PASSWORD}'
      # Grafana reads the file at provisioning time ($__file interpolation);
      # the plugin itself never touches the filesystem.
      token: '$__file{/tokens/garmin_token.json}'

  - name: tempo
    uid: tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    editable: true

  - name: loki
    uid: loki
    type: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        # $$ escapes Grafana's provisioning env-var interpolation
        - name: traceId
          matcherRegex: 'traceId=(\w+)'
          datasourceUid: tempo
          url: '$${__value.raw}'
          urlDisplayLabel: 'View trace'
