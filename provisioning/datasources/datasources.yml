apiVersion: 1

datasources:
  - name: 'garminconnect'
    type: 'barnesc-garminconnect-datasource'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    jsonData:
      email: '${GARMIN_EMAIL}'
      tokenFile: '/tokens/garmin_token.json'
    secureJsonData:
      password: '${GARMIN_PASSWORD}'

  - name: tempo
    uid: tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    editable: true

  - name: loki
    uid: loki
    type: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        # $$ escapes Grafana's provisioning env-var interpolation
        - name: traceId
          matcherRegex: 'traceId=(\w+)'
          datasourceUid: tempo
          url: '$${__value.raw}'
          urlDisplayLabel: 'View trace'
