apiVersion: 1

datasources:
  - name: 'garminconnect'
    type: 'barnesc-garminconnect-datasource'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    jsonData:
      email: '${GARMIN_EMAIL}'
      tokenFile: '/tokens/garmin_token.json'
    secureJsonData:
      password: '${GARMIN_PASSWORD}'
      mfaCode: '${GARMIN_MFA_CODE}'

  - name: tempo
    uid: tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    editable: true
