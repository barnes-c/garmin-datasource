# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        # Signing requires the GRAFANA_ACCESS_POLICY_TOKEN repository secret; see
        # https://grafana.com/developers/plugin-tools/publish-a-plugin/sign-a-plugin#generate-an-access-policy-token
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          # go.mod requires 1.26.x; the action defaults to 1.25 and pins
          # GOTOOLCHAIN=local, so the exact patch must satisfy go.mod.
          go-version: '1.26.5'
          # Provenance attestation for the plugin catalog's build verification.
          attestation: 'true'
